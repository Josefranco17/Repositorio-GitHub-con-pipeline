{% extends 'main/base.html' %}

{% block title %}Eliminar camiseta{% endblock %}

{% block content %}
<div class="alert alert-warning">
    <h1>Eliminar camiseta</h1>
    <p>¿Estás seguro de que quieres eliminar <strong>{{ book.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a class="btn btn-secondary" href="{% url 'book_detail' book.pk %}">Cancelar</a>
    </form>
</div>
{% endblock %}
