<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .box { fill: #E3F2FD; stroke: #1976D2; stroke-width: 2; }
      .title { font-size: 18px; font-weight: bold; fill: #1976D2; }
      .label { font-size: 12px; fill: #333; }
      .arrow { fill: none; stroke: #555; stroke-width: 2; marker-end: url(#arrowhead); }
      .cloud { fill: #FFF3E0; stroke: #F57C00; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#555" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="600" y="30" class="title" text-anchor="middle" font-size="24">Arquitectura MultiCloud - Tienda de Camisetas</text>

  <!-- Usuario -->
  <circle cx="100" cy="150" r="40" class="box"/>
  <text x="100" y="160" class="label" text-anchor="middle">Usuario</text>

  <!-- GitHub Actions -->
  <rect x="250" y="100" width="150" height="100" rx="5" class="cloud"/>
  <text x="325" y="135" class="label" text-anchor="middle" font-weight="bold">GitHub Actions</text>
  <text x="325" y="155" class="label" text-anchor="middle">CI/CD Pipeline</text>
  <text x="325" y="175" class="label" text-anchor="middle">.github/workflows</text>

  <!-- AWS VPC -->
  <g>
    <rect x="500" y="50" width="300" height="250" class="box" fill="none" stroke-dasharray="5,5"/>
    <text x="650" y="75" class="label" text-anchor="middle" font-weight="bold">AWS VPC</text>
    
    <!-- EC2 Instance -->
    <rect x="550" y="120" width="200" height="80" rx="5" class="box"/>
    <text x="650" y="145" class="label" text-anchor="middle" font-weight="bold">EC2 Instance</text>
    <text x="650" y="165" class="label" text-anchor="middle">Django App</text>
    <text x="650" y="185" class="label" text-anchor="middle">Puerto: 8000</text>

    <!-- Security Group -->
    <rect x="550" y="220" width="200" height="60" rx="5" class="box" fill="#FFEBEE" stroke="#C62828"/>
    <text x="650" y="242" class="label" text-anchor="middle" font-weight="bold">Security Group</text>
    <text x="650" y="262" class="label" text-anchor="middle">OWASP Top 10</text>
  </g>

  <!-- OCI Database -->
  <g>
    <rect x="50" y="400" width="220" height="150" rx="5" class="cloud"/>
    <text x="160" y="430" class="label" text-anchor="middle" font-weight="bold">OCI Autonomous</text>
    <text x="160" y="450" class="label" text-anchor="middle">AI Database</text>
    <text x="160" y="475" class="label" text-anchor="middle">📊 Datos estructurados</text>
    <text x="160" y="495" class="label" text-anchor="middle">👕 Registros de camisetas</text>
    <text x="160" y="515" class="label" text-anchor="middle">🔐 Cifrado</text>
  </g>

  <!-- Azure Blob Storage -->
  <g>
    <rect x="350" y="400" width="220" height="150" rx="5" class="cloud"/>
    <text x="460" y="430" class="label" text-anchor="middle" font-weight="bold">Azure Blob Storage</text>
    <text x="460" y="455" class="label" text-anchor="middle">🖼️ Imágenes de camisetas</text>
    <text x="460" y="475" class="label" text-anchor="middle">📁 Multimedia</text>
    <text x="460" y="495" class="label" text-anchor="middle">🔒 RBAC</text>
    <text x="460" y="515" class="label" text-anchor="middle">CDN integrado</text>
  </g>

  <!-- Django App Features -->
  <g>
    <rect x="650" y="400" width="200" height="150" rx="5" class="box" fill="#F3E5F5"/>
    <text x="750" y="425" class="label" text-anchor="middle" font-weight="bold">Django App</text>
    <text x="750" y="445" class="label" text-anchor="middle">✅ CRUD Camisetas</text>
    <text x="750" y="463" class="label" text-anchor="middle">✅ Carrito</text>
    <text x="750" y="481" class="label" text-anchor="middle">✅ Login/Sesiones</text>
    <text x="750" y="499" class="label" text-anchor="middle">✅ Validaciones</text>
    <text x="750" y="517" class="label" text-anchor="middle">✅ CSRF Protection</text>
  </g>

  <!-- Arrows -->
  <!-- Usuario a GitHub Actions -->
  <path d="M 140 150 L 250 150" class="arrow"/>
  <text x="190" y="140" class="label">Push code</text>

  <!-- GitHub Actions a EC2 -->
  <path d="M 400 150 L 500 150" class="arrow"/>
  <text x="445" y="140" class="label">Deploy</text>

  <!-- EC2 a OCI DB -->
  <path d="M 550 200 L 270 420" class="arrow"/>
  <text x="400" y="300" class="label">Query datos</text>

  <!-- EC2 a Azure Blob -->
  <path d="M 600 200 L 460 400" class="arrow"/>
  <text x="520" y="300" class="label">Subir/Descargar</text>

  <!-- Usuario a Web App -->
  <path d="M 140 190 L 550 160" class="arrow" stroke-dasharray="3,3"/>
  <text x="320" y="180" class="label">HTTP Requests</text>

  <!-- Legend -->
  <g transform="translate(900, 100)">
    <text x="0" y="0" class="title" font-size="16">Componentes</text>
    <rect x="0" y="15" width="15" height="15" class="cloud"/>
    <text x="25" y="28" class="label">Cloud Services</text>
    
    <rect x="0" y="45" width="15" height="15" class="box"/>
    <text x="25" y="58" class="label">AWS Infrastructure</text>
    
    <line x1="0" y1="80" x2="15" y2="80" class="arrow"/>
    <text x="25" y="85" class="label">Data Flow</text>
  </g>

  <!-- Security Note -->
  <g transform="translate(900, 500)">
    <rect x="0" y="0" width="280" height="120" rx="5" fill="#FFFDE7" stroke="#FBC02D" stroke-width="2"/>
    <text x="140" y="25" class="label" text-anchor="middle" font-weight="bold">🔒 Controles de Seguridad</text>
    <text x="140" y="50" class="label" text-anchor="middle" font-size="11">✓ OWASP Top 10 implementados</text>
    <text x="140" y="68" class="label" text-anchor="middle" font-size="11">✓ CSRF tokens en formularios</text>
    <text x="140" y="86" class="label" text-anchor="middle" font-size="11">✓ Validación de inputs/outputs</text>
    <text x="140" y="104" class="label" text-anchor="middle" font-size="11">✓ Cifrado en tránsito (HTTPS)</text>
  </g>
</svg>
